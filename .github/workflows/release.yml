name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  DOTNET_VERSION: 10.0.x
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  publish:
    runs-on: ${{ vars.CI_RUNNER || fromJSON('["self-hosted","linux","x64","general-purpose"]') }}
    environment: release
    permissions:
      contents: write
      id-token: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install NBGV CLI
        run: |
          dotnet tool install \
            --tool-path "$RUNNER_TEMP/nbgv" \
            nbgv \
            --version 3.7.115
          echo "$RUNNER_TEMP/nbgv" >> "$GITHUB_PATH"

      - name: Validate release version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "::error::Run the release workflow from a version tag."
            exit 1
          fi

          TAG="${GITHUB_REF_NAME}"
          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag '${TAG}' is not a supported semantic version tag."
            exit 1
          fi

          VERSION="${TAG#v}"
          NBGV_SEMVER="$(nbgv get-version -v SemVer2)"
          NUGET_VERSION="$(nbgv get-version -v NuGetPackageVersion)"
          if [[ "${NBGV_SEMVER}" != "${VERSION}" ]]; then
            echo "::error::Tag version '${VERSION}' does not match NBGV semantic version '${NBGV_SEMVER}'."
            exit 1
          fi

          if ! grep -Fq "## [${VERSION}]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md does not contain a '${VERSION}' release section."
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "package-version=${NUGET_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore src/NexusLabs.Foundry.slnx

      - name: Build
        run: dotnet build src/NexusLabs.Foundry.slnx --configuration Release --no-restore -p:PublicRelease=true

      - name: Test
        shell: bash
        run: |
          failed=0
          while IFS= read -r project; do
            echo "::group::Testing $(basename "$project")"
            dotnet test "$project" \
              --configuration Release \
              --no-build \
              --verbosity normal \
              --blame-hang \
              --blame-hang-dump-type none \
              --blame-hang-timeout 5m \
              --filter "Category!=Integration" || failed=1
            echo "::endgroup::"
          done < <(find src -name '*.Tests.csproj' | sort)
          exit $failed

      - name: Pack
        shell: bash
        env:
          GITHUB_ENV: /tmp/discard-pack-env
          GITHUB_OUTPUT: /tmp/discard-pack-output
          GITHUB_STEP_SUMMARY: /tmp/discard-pack-summary
        run: |
          mkdir -p artifacts/packages
          mapfile -t projects < <(find src -name 'NexusLabs.Foundry*.csproj' \
            ! -name '*.Tests.csproj' | sort)

          if [ ${#projects[@]} -eq 0 ]; then
            echo "::error::No Foundry package projects were found."
            exit 1
          fi

          for project in "${projects[@]}"; do
            dotnet pack "$project" \
              --configuration Release \
              --no-build \
              -p:PublicRelease=true \
              --output artifacts/packages
          done

      - name: Validate packages
        shell: pwsh
        run: scripts/validate-packages.ps1 -ExpectedVersion '${{ steps.version.outputs.package-version }}'

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: foundry-packages-${{ steps.version.outputs.version }}
          path: artifacts/packages/*

      - name: Authenticate to NuGet.org
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ncosentino

      - name: Push to NuGet.org
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        run: |
          for package in artifacts/packages/*.nupkg; do
            dotnet nuget push "$package" \
              --api-key "$NUGET_API_KEY" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done

      - name: Push to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for package in artifacts/packages/*.nupkg; do
            dotnet nuget push "$package" \
              --api-key "$GITHUB_TOKEN" \
              --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
              --skip-duplicate
          done

      - name: Extract release notes
        id: release-notes
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES="$(awk -v version="${VERSION}" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" version "]")) found=1
            }
            found && /^\[[^]]+\]: / { exit }
            found { print }
          ' CHANGELOG.md)"

          if [ -z "${NOTES}" ]; then
            echo "::error::Could not extract changelog notes for ${VERSION}."
            exit 1
          fi

          {
            echo "notes<<CHANGELOG_EOF"
            echo "${NOTES}"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ steps.release-notes.outputs.notes }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg

  documentation:
    needs: publish
    runs-on: ${{ vars.CI_RUNNER || fromJSON('["self-hosted","linux","x64","general-purpose"]') }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            ${{ env.DOTNET_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install documentation dependencies
        run: pip install -r requirements-docs.txt

      - name: Restore
        run: dotnet restore src/NexusLabs.Foundry.slnx

      - name: Build release assemblies
        env:
          GITHUB_ENV: /tmp/discard-release-docs-build-env
          GITHUB_OUTPUT: /tmp/discard-release-docs-build-output
        run: dotnet build src/NexusLabs.Foundry.slnx --configuration Release --no-restore -p:PublicRelease=true

      - name: Restore documentation tools
        run: dotnet tool restore

      - name: Generate versioned API documentation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ./scripts/generate-versioned-api-docs.sh "$VERSION"

      - name: Generate development API documentation
        run: ./scripts/generate-api-docs.sh docs/api/dev --update-index

      - name: Build documentation
        run: python -m mkdocs build --strict

      - name: Restrict artifact to release-owned paths
        run: |
          rm -rf site/api/dev
          echo "Removed development API documentation slice."

      - name: Build sitemap index
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/build-sitemap-index.py site

      - name: Merge release documentation into gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ./scripts/publish-docs-merge.sh site release "$VERSION"
