name: Documentation

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy the generated site to Cloudflare Pages
        required: false
        default: false
        type: boolean

env:
  DOTNET_VERSION: 10.0.x
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  docs:
    runs-on: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork && 'ubuntu-latest' || vars.CI_RUNNER || fromJSON('["self-hosted","linux","x64","general-purpose"]') }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            ${{ env.DOTNET_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install documentation dependencies
        run: pip install -r requirements-docs.txt

      - name: Test documentation scripts
        run: python -m unittest discover -s scripts/tests -p "test_*.py"

      - name: Restore
        run: dotnet restore src/NexusLabs.Foundry.slnx

      - name: Build release assemblies
        env:
          GITHUB_ENV: /tmp/discard-docs-build-env
          GITHUB_OUTPUT: /tmp/discard-docs-build-output
        run: dotnet build src/NexusLabs.Foundry.slnx --configuration Release --no-restore

      - name: Restore documentation tools
        run: dotnet tool restore

      - name: Generate development API documentation
        run: ./scripts/generate-api-docs.sh docs/api/dev --update-index

      - name: Generate API version catalog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/generate-api-catalog.py

      - name: Build documentation
        run: python -m mkdocs build --strict

      - name: Restrict artifact to development-owned paths
        run: |
          rm -rf site/api/stable site/api/v*
          echo "Removed release-owned API documentation slices."

      - name: Build sitemap index
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/build-sitemap-index.py site

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: foundry-site
          path: site

  deploy:
    needs: docs
    if: >-
      github.ref == 'refs/heads/main' &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && inputs.deploy)
      )
    runs-on: ${{ vars.CI_RUNNER || fromJSON('["self-hosted","linux","x64","general-purpose"]') }}
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Download documentation artifact
        uses: actions/download-artifact@v5
        with:
          name: foundry-site
          path: site

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Merge development documentation into gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/publish-docs-merge.sh site main
