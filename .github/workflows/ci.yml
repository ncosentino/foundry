name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  DOTNET_VERSION: 10.0.x
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  build-test-pack:
    # PitCrew default. Set CI_RUNNER=ubuntu-latest for the manual cloud fallback.
    # Untrusted fork pull requests always use GitHub-hosted infrastructure.
    runs-on: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork && 'ubuntu-latest' || vars.CI_RUNNER || fromJSON('["self-hosted","linux","x64","general-purpose"]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore src/NexusLabs.Foundry.slnx

      - name: Build
        run: dotnet build src/NexusLabs.Foundry.slnx --configuration Release --no-restore

      - name: Test
        shell: bash
        run: |
          failed=0
          while IFS= read -r project; do
            echo "::group::Testing $(basename "$project")"
            dotnet test "$project" \
              --configuration Release \
              --no-build \
              --verbosity normal \
              --blame-hang \
              --blame-hang-dump-type none \
              --blame-hang-timeout 5m \
              --filter "Category!=Integration" || failed=1
            echo "::endgroup::"
          done < <(find src -name '*.Tests.csproj' | sort)
          exit $failed

      - name: Pack
        shell: bash
        env:
          GITHUB_ENV: /tmp/discard-pack-env
          GITHUB_OUTPUT: /tmp/discard-pack-output
          GITHUB_STEP_SUMMARY: /tmp/discard-pack-summary
        run: |
          mkdir -p artifacts/packages
          mapfile -t projects < <(find src -name 'NexusLabs.Foundry*.csproj' \
            ! -name '*.Tests.csproj' | sort)

          if [ ${#projects[@]} -eq 0 ]; then
            echo "::error::No Foundry package projects were found."
            exit 1
          fi

          for project in "${projects[@]}"; do
            dotnet pack "$project" \
              --configuration Release \
              --no-build \
              --output artifacts/packages
          done

      - name: Validate packages
        shell: pwsh
        run: scripts/validate-packages.ps1

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: foundry-packages
          path: artifacts/packages/*

  aot:
    runs-on: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork && 'ubuntu-latest' || vars.CI_RUNNER || fromJSON('["self-hosted","linux","x64","general-purpose"]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install NativeAOT dependencies
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev file

      - name: Publish representative NativeAOT app
        env:
          GITHUB_ENV: /tmp/discard-aot-env
          GITHUB_OUTPUT: /tmp/discard-aot-output
          GITHUB_STEP_SUMMARY: /tmp/discard-aot-summary
        run: |
          dotnet publish src/Examples/AgentFramework/AotAgentFrameworkApp/AotAgentFrameworkApp.csproj \
            --configuration Release \
            --runtime linux-x64 \
            --self-contained \
            --output artifacts/aot

      - name: Verify NativeAOT executable
        run: |
          test -f artifacts/aot/AotAgentFrameworkApp
          file artifacts/aot/AotAgentFrameworkApp

      - name: Upload NativeAOT artifact
        uses: actions/upload-artifact@v4
        with:
          name: foundry-aot-linux-x64
          path: artifacts/aot/AotAgentFrameworkApp
